<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#222738;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:30px;
            font-family:微软雅黑;
        }
        h2{color:#fff;margin-bottom:8px}
        .score{
            color:#ffd700;
            font-size:22px;
            margin:8px 0;
        }
        #canvas{
            border:3px solid #fff;
            background:#0c1222;
        }
        .btns{margin-top:12px}
        button{
            padding:8px 22px;
            font-size:16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin:0 5px;
        }
        #start{background:#28c76f;color:#fff}
        #reset{background:#ff5252;color:#fff}
        .tip{color:#ccc;margin-top:10px}
    </style>
</head>
<body>
    <h2>经典贪吃蛇</h2>
    <div class="score">当前得分：<span id="scoreNum">0</span></div>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="btns">
        <button id="start">开始游戏</button>
        <button id="reset">重新开局</button>
    </div>
    <div class="tip">方向键 ↑ ↓ ← → 控制移动</div>

    <script>
        //基础配置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDom = document.getElementById('scoreNum');
        const startBtn = document.getElementById('start');
        const resetBtn = document.getElementById('reset');
        const size = 20; //格子大小

        //游戏变量
        let snake;
        let food;
        let dirX = 0; //移动X，开局不动
        let dirY = 0; //移动Y
        let score = 0;
        let timer = null;
        const speed = 130;

        //初始化游戏数据
        function initGame(){
            score = 0;
            scoreDom.textContent = score;
            //蛇初始两节，横向向右摆放，不会自残
            snake = [
                {x:5,y:10}, //蛇头
                {x:4,y:10}  //蛇身
            ];
            dirX = 0;
            dirY = 0;
            createFood();
            //清空定时器
            if(timer) clearInterval(timer);
        }

        //随机生成食物（不在蛇身上）
        function createFood(){
            let flag = true;
            while(flag){
                food = {
                    x:Math.floor(Math.random()*(canvas.width/size)),
                    y:Math.floor(Math.random()*(canvas.height/size))
                }
                //判断食物是否生成在蛇身上
                flag = snake.some(item=>item.x===food.x&&item.y===food.y)
            }
        }

        //绘制画面
        function render(){
            //清空画布
            ctx.fillStyle='#0c1222';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            //画食物 红色
            ctx.fillStyle='#ff4444';
            ctx.fillRect(food.x*size+1,food.y*size+1,size-2,size-2);

            //画蛇 绿色
            ctx.fillStyle='#39ff66';
            snake.forEach(item=>{
                ctx.fillRect(item.x*size+1,item.y*size+1,size-2,size-2);
            })
        }

        //蛇移动逻辑
        function moveSnake(){
            //新建蛇头
            const head = {
                x:snake[0].x + dirX,
                y:snake[0].y + dirY
            }
            //撞墙判定
            if(head.x<0||head.y<0||head.x>=canvas.width/size||head.y>=canvas.height/size){
                gameOver();
                return;
            }
            //撞到自己身体
            if(snake.some(item=>item.x===head.x&&item.y===head.y)){
                gameOver();
                return;
            }
            //新蛇头加入头部
            snake.unshift(head);

            //吃到食物：加分、不删尾巴
            if(head.x===food.x&&head.y===food.y){
                score +=10;
                scoreDom.textContent = score;
                createFood();
            }else{
                //没吃到，删掉尾巴保持长度
                snake.pop();
            }
            render();
        }

        //游戏结束
        function gameOver(){
            clearInterval(timer);
            alert('游戏结束！得分：'+score+'，点重新开局再来！')
        }

        //开始游戏
        function startGame(){
            if(timer) return; //正在运行禁止重复开启
            //开局默认向右移动
            dirX = 1;
            dirY = 0;
            timer = setInterval(moveSnake,speed);
        }

        //键盘控制方向
        document.addEventListener('keydown',e=>{
            //没开始游戏不响应按键
            if(!timer) return;
            switch(e.key){
                case 'ArrowUp':
                    if(dirY!==1){dirX=0;dirY=-1}
                    break;
                case 'ArrowDown':
                    if(dirY!==-1){dirX=0;dirY=1}
                    break;
                case 'ArrowLeft':
                    if(dirX!==1){dirX=-1;dirY=0}
                    break;
                case 'ArrowRight':
                    if(dirX!==-1){dirX=1;dirY=0}
                    break;
            }
        })

        //按钮绑定
        startBtn.onclick = startGame;
        resetBtn.onclick = ()=>{
            initGame();
            render();
        }

        //页面加载初始化
        initGame();
        render();
    </script>
</body>
</html>
